<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recursion Tree Visualizer — Arrow Traversal</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
  <div id="sidebar">
    <h2>Pre-defined templates</h2>
    <select id="templateSelect" onchange="loadTemplate(this.value)">
      <option value="fibonacci">Fibonacci</option>
      <option value="factorial">Factorial</option>
      <option value="nqueens">N-Queens (placeholder)</option>
    </select>

    <h2>Recursive function (C++)</h2>
    <textarea id="codeInput">// Fibonacci example
int fib(int n) {
  if (n <= 1) return n;
  return fib(n-1) + fib(n-2);
}
    </textarea>

    <h2>Input</h2>
    <label class="small">n (integer)</label>
    <input type="number" id="nValue" min="0" value="5" />

    <h2>Options</h2>
    <div class="option"><span>Memoization</span>
      <label class="switch"><input type="checkbox" id="memoToggle"><span class="slider"></span></label>
    </div>
    <div class="option"><span>Step-by-step</span>
      <label class="switch"><input type="checkbox" id="stepToggle" checked><span class="slider"></span></label>
    </div>
    <div class="option"><span>Dark mode</span>
      <label class="switch"><input type="checkbox" id="darkToggle"><span class="slider"></span></label>
    </div>

    <div style="height:8px"></div>
    <button class="primary" onclick="runVisualizer()">Run Visualizer</button>
    <div style="height:12px"></div>
    <div style="font-size:13px;color:#666">Notes: this prototype visualizes Fibonacci recursion. "Memoization" toggle is present for future wiring.</div>
  </div>

  <div id="main">
    <div id="outputTitle">Recursion Tree Output</div>
    <div id="canvasWrap">
      <svg id="treeSVG" width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
        <!-- arrowhead marker -->
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
            <path d="M0,0 L8,4 L0,8 z" fill="#444"></path>
          </marker>
        </defs>
      </svg>
      <div id="footerNote">Tip: enable Step-by-step for clear animation</div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
